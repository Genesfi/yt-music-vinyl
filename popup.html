<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
</head>

<body style="width: 220px; padding: 15px; font-family: sans-serif; background: #222; color: white;">

    <!-- Header with Icon -->
    <h3 style="margin: 0 0 15px 0; font-size: 16px; display: flex; align-items: center; justify-content: center;">
        <img src="icon128.png" style="width: 24px; height: 24px; margin-right: 8px; border-radius: 50%;">
        Vinyl Settings
    </h3>

    <!-- Master Toggle (BARU) -->
    <label
        style="display: block; margin-bottom: 15px; cursor: pointer; border-bottom: 1px solid #444; padding-bottom: 10px;">
        <input type="checkbox" id="masterToggle"> <b>Enable Vinyl Effect</b>
    </label>

    <!-- Toggle Video -->
    <label
        style="display: block; margin-bottom: 20px; cursor: pointer; border-bottom: 1px solid #444; padding-bottom: 10px;">
        <input type="checkbox" id="videoToggle"> Show Video
    </label>

    <label
        style="display: block; margin-bottom: 20px; cursor: pointer; border-bottom: 1px solid #444; padding-bottom: 10px;">
        <input type="checkbox" id="beatToggle"> <b>Enable Beat Pulse</b>
    </label>

    <label style="display: block; margin-bottom: 5px; font-size: 13px;">
        Min Scale (Normal): <b id="minScaleValue" style="color: #00e676;">1.00</b>
    </label>
    <input type="range" id="minScaleSlider" min="0.95" max="1.05" step="0.01" value="1.00"
        style="width: 100%; cursor: pointer; margin-bottom: 15px;">

    <label style="display: block; margin-bottom: 5px; font-size: 13px;">
        Max Scale (Peak Beat): <b id="maxScaleValue" style="color: #00e676;">1.12</b>
    </label>
    <input type="range" id="maxScaleSlider" min="1.06" max="1.25" step="0.01" value="1.12"
        style="width: 100%; cursor: pointer; margin-bottom: 20px;">

    <label style="display: block; margin-bottom: 5px; font-size: 13px;">
        Beat Sensitivity: <b id="sensValue" style="color: #00e676;">1.5</b>x
    </label>
    <input type="range" id="sensSlider" min="0.5" max="4.0" step="0.1" value="1.5"
        style="width: 100%; cursor: pointer; margin-bottom: 25px;">

    <button id="resetBtn"
        style="width: 100%; padding: 8px; background: #dc3545; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 15px; transition: 0.2s;">
        Reset to Default
    </button>

    <!-- Slider Speed -->
    <label style="display: block; margin-bottom: 5px; font-size: 13px;">
        Spin Speed: <b id="speedValue" style="color: #00e676;">10</b> sec/spin
    </label>
    <input type="range" id="speedSlider" min="1" max="20" step="1" value="10" style="width: 100%; cursor: pointer;">

    <script src="popup.js"></script>
</body>

</html>
